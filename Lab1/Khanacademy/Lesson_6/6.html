<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Invite</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .invite-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
        }

        p {
            color: rgb(106, 3, 27);
            background-color: rgb(248, 222, 228);;
            color: #666;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #2980b9;
        }

    </style>
</head>
<body>
    <div class="invite-container">
        <h1>My Event</h1>
        <img src="https://images.squarespace-cdn.com/content/v1/57cf5e97414fb5a80f7a837b/1519410893820-Z6QV8X1Q4NFKBP6E9176/shutterstock_512157103.jpg?format=2500w" alt="Event" width="200">
        <p>Date: [Tomorrow]</p>
        <p>Time: [16:00]</p>
        <p>Location: [Almaty]</p>
        <p>Details: [Dress code]</p>
        
        <!-- Add guest list or RSVP button as needed -->

        <a href="#" class="button">RSVP Now</a>
    </div>
</body>
</html>
