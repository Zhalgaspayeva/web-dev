<div>
  <button (click)="toggleCategories()" style="font-size: 20px">Выберите категорию</button>
  <div *ngIf="showCategories">
    <h2>Категории</h2>
    <ul>
      <li *ngFor="let category of categories">
        <button (click)="onCategorySelected(category)">{{ category }}</button>
      </li>
    </ul>
  </div>
</div>
<span style="margin-right: 10px;"></span>
<div *ngIf="selectedCategory">
  <h2>{{ selectedCategory }}</h2>
</div>
